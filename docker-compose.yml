services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sales2
      JWT_SECRET: "change-this-to-a-long-random-string-in-production"
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node src/setup.js && node src/seed.js && node src/index.js"

  frontend:
    build: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
